<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Reporte de Postes - EDR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container">
        <div class="logo-container">
            <img src="https://via.placeholder.com/200x80?text=LOGO+EMPRESA" alt="Logo de la Empresa" id="logo">
        </div>
        
        <h2>Iniciar Sesión</h2>
        
        <form id="login-form">
            <div class="input-group">
                <i class="fas fa-user icon"></i>
                <input type="text" id="usuario" placeholder="Usuario" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
                <i class="fas fa-eye" id="togglePassword" title="Mostrar/Ocultar contraseña"></i>
            </div>

            <button type="submit" id="btn-submit">Entrar</button>
            <p id="login-error" style="display: none;">Credenciales incorrectas</p>
        </form>
    </div>

    <div id="app-container" style="display: none;">
        <div id="header">
            <h2>Reporte de Postes</h2>
            <button id="btn-logout"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
