<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte ENEE</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { width: 100px; display: block; margin: 0 auto 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .pass-container { position: relative; }
        .toggle-btn { position: absolute; right: 10px; top: 20px; cursor: pointer; }
        #app { display: none; } /* Oculto hasta login exitoso */
    </style>
</head>
<body>

<div class="card" id="login-box">
    <img src="tu-logo.png" class="logo" alt="Logo"> <h2>Iniciar Sesión</h2>
    <input type="text" id="user" placeholder="usuario">
    <div class="pass-container">
        <input type="password" id="pass" placeholder="contrasena">
        <span class="toggle-btn" onclick="togglePass()">👁️</span>
    </div>
    <button onclick="login()" style="width:100%; padding:10px;">Entrar</button>
</div>

<div class="card" id="app">
    <h1>Reporte Activo</h1>
    <p>Bienvenido al sistema.</p>
    </div>

<script>
    function togglePass() {
        let p = document.getElementById('pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    async function login() {
        const usuario = document.getElementById('user').value;
        const contraseña = document.getElementById('pass').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            body: JSON.stringify({ usuario, contraseña })
        });

        if (res.ok) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        } else {
            alert('Credenciales incorrectas');
        }
    }
</script>
</body>
</html>
