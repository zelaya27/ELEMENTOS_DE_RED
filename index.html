<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Reporte de Redes</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .login-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://raw.githubusercontent.com/zelaya27/ELEMENTOS_DE_RED/main/UTCD%20Vertical.png" style="width: 150px; height: auto;" alt="Logo">
        <h2>Iniciar Sesión</h2>
<div style="position: relative;">
    <input type="password" id="contrasena" placeholder="Contraseña">
    <button type="button" onclick="togglePassword()" style="width: auto; position: absolute; right: 5px; top: 5px; padding: 5px; background: none; color: #666; border: none; cursor: pointer; font-size: 12px;">👁️</button>
</div>
        <button onclick="validarLogin()">Entrar</button>
        <p id="mensaje"></p>
        
    </div>
    <script src="app.js"></script>
</body>
</html>
